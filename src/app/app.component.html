<header class="fixed top-0 left-0 right-0 z-50 border-b border-border bg-background/80 backdrop-blur-lg">
  <div class="mx-auto flex h-14 max-w-5xl items-center justify-between px-6">
    <a routerLink="/" class="flex items-center">
      <img src="/logo.svg" alt="Wap" class="h-14 rounded-lg" />
    </a>

    <nav class="hidden items-center gap-6 md:flex">
      <a routerLink="/" fragment="features" class="text-sm text-muted-foreground transition-colors hover:text-foreground">Funcionalidades</a>
      <a routerLink="/" fragment="quickstart" class="text-sm text-muted-foreground transition-colors hover:text-foreground">Quick Start</a>
      <a routerLink="/docs" routerLinkActive="text-foreground" [routerLinkActiveOptions]="{ exact: false }" class="text-sm text-muted-foreground transition-colors hover:text-foreground">Docs</a>
    </nav>

    <div class="flex items-center gap-2">
      <button
        (click)="toggleTheme()"
        class="inline-flex size-8 items-center justify-center rounded-md text-muted-foreground transition-colors hover:bg-accent hover:text-foreground"
        aria-label="Alternar tema"
      >
        @if (isDark) {
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        }
      </button>

      <a
        href="https://github.com/mathsukamura/wap"
        target="_blank"
        rel="noopener"
        class="inline-flex size-8 items-center justify-center rounded-md text-muted-foreground transition-colors hover:bg-accent hover:text-foreground"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      </a>

      <a
        href="https://www.nuget.org/packages/Wap"
        target="_blank"
        rel="noopener"
        class="hidden rounded-md bg-primary px-3 py-1.5 text-xs font-medium text-primary-foreground transition-colors hover:bg-primary/90 md:inline-flex"
      >
        NuGet
      </a>

      <button
        (click)="toggleMobileMenu()"
        class="inline-flex size-8 items-center justify-center rounded-md text-muted-foreground hover:bg-accent md:hidden"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>

  @if (mobileMenuOpen) {
    <div class="border-t border-border bg-background px-6 py-4 md:hidden">
      <nav class="flex flex-col gap-3">
        <a (click)="toggleMobileMenu()" routerLink="/" fragment="features" class="text-sm text-muted-foreground hover:text-foreground">Funcionalidades</a>
        <a (click)="toggleMobileMenu()" routerLink="/" fragment="quickstart" class="text-sm text-muted-foreground hover:text-foreground">Quick Start</a>
        <a (click)="toggleMobileMenu()" routerLink="/docs" class="text-sm text-muted-foreground hover:text-foreground">Docs</a>
      </nav>
    </div>
  }
</header>

<router-outlet />
