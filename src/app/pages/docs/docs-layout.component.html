<div class="pt-14">
  <div class="mx-auto max-w-5xl px-6">
    <div class="flex gap-8 py-8">
      <button
        (click)="toggleSidebar()"
        class="fixed bottom-4 right-4 z-40 inline-flex size-10 items-center justify-center rounded-full bg-primary text-primary-foreground shadow-lg md:hidden"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

      @if (sidebarOpen) {
        <div (click)="closeSidebar()" class="fixed inset-0 z-40 bg-background/80 backdrop-blur-sm md:hidden"></div>
      }

      <aside
        [class]="sidebarOpen
          ? 'fixed inset-y-0 left-0 z-50 w-64 overflow-y-auto border-r border-border bg-background px-6 pt-20 pb-8 md:sticky md:top-14 md:z-0 md:block md:h-[calc(100svh-3.5rem)] md:w-52 md:shrink-0 md:border-0 md:px-0 md:pt-0'
          : 'hidden md:sticky md:top-14 md:block md:h-[calc(100svh-3.5rem)] md:w-52 md:shrink-0 md:overflow-y-auto md:pt-0'"
      >
        <nav class="space-y-6">
          @for (group of navGroups; track group.title) {
            <div>
              <p class="mb-2 text-[10px] font-medium uppercase tracking-widest text-muted-foreground">{{ group.title }}</p>
              <ul class="space-y-0.5">
                @for (item of group.items; track item.slug) {
                  <li>
                    <a
                      [routerLink]="['/docs', item.slug]"
                      routerLinkActive="bg-accent text-foreground"
                      (click)="closeSidebar()"
                      class="block rounded-md px-2.5 py-1.5 text-sm text-muted-foreground transition-colors hover:bg-accent hover:text-foreground"
                    >
                      {{ item.label }}
                    </a>
                  </li>
                }
              </ul>
            </div>
          }
        </nav>
      </aside>

      <main class="min-w-0 flex-1">
        <router-outlet />
      </main>
    </div>
  </div>
</div>
