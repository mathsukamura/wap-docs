<div>
  <h1 class="text-2xl font-bold text-foreground">Canais</h1>
  <p class="mt-2 text-sm text-muted-foreground">
    Newsletters e comunidades do WhatsApp.
  </p>

  <div class="mt-8 space-y-6">
    <div class="rounded-lg border border-border bg-card p-6">
      <h2 class="text-lg font-semibold text-foreground">Newsletters</h2>
      <p class="mt-3 text-sm leading-relaxed text-muted-foreground">
        Crie, busque e gerencie canais/newsletters.
      </p>
      <div class="mt-4">
        <app-code-block [code]="newsletterCode" language="csharp" />
      </div>
    </div>

    <div class="rounded-lg border border-border bg-card p-6">
      <h2 class="text-lg font-semibold text-foreground">Comunidades</h2>
      <p class="mt-3 text-sm leading-relaxed text-muted-foreground">
        Crie comunidades e vincule grupos a elas.
      </p>
      <div class="mt-4">
        <app-code-block [code]="communityCode" language="csharp" />
      </div>
    </div>
  </div>
</div>
