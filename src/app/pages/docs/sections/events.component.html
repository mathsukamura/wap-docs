<div>
  <h1 class="text-2xl font-bold text-foreground">Eventos</h1>
  <p class="mt-2 text-sm text-muted-foreground">
    Todos os eventos disponíveis para escutar.
  </p>

  <div class="mt-8 space-y-6">
    <div class="rounded-lg border border-border bg-card p-6">
      <h2 class="text-lg font-semibold text-foreground">Todos os Eventos</h2>
      <p class="mt-3 text-sm leading-relaxed text-muted-foreground">
        Lista de todos os eventos que o WapClient expõe.
      </p>
      <div class="mt-4">
        <app-code-block [code]="allEventsCode" language="csharp" />
      </div>
    </div>

    <div class="rounded-lg border border-border bg-card p-6">
      <h2 class="text-lg font-semibold text-foreground">Evento de Conexão</h2>
      <p class="mt-3 text-sm leading-relaxed text-muted-foreground">
        Monitore o estado da conexão, QR codes e razões de desconexão.
      </p>
      <div class="mt-4">
        <app-code-block [code]="connectionCode" language="csharp" />
      </div>
    </div>

    <div class="rounded-lg border border-border bg-card p-6">
      <h2 class="text-lg font-semibold text-foreground">Evento de Mensagem</h2>
      <p class="mt-3 text-sm leading-relaxed text-muted-foreground">
        Receba mensagens decriptadas com informações do remetente e conteúdo.
      </p>
      <div class="mt-4">
        <app-code-block [code]="messageCode" language="csharp" />
      </div>
    </div>
  </div>
</div>
